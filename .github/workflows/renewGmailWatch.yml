name: Renew Gmail Watch

on:
  schedule:
    # 10 PM IST = 4:30 PM UTC
    - cron: "30 16 * * *"

  workflow_dispatch:

jobs:
  renew-watch:
    runs-on: ubuntu-latest

    steps:
      - name: Get OAuth Access Token
        id: token
        run: |
          ACCESS_TOKEN=$(curl -s \
            -X POST https://oauth2.googleapis.com/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.GOOGLE_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" \
            | jq -r '.access_token')

          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Renew Gmail Watch
        run: |
          curl -X POST \
            "https://gmail.googleapis.com/gmail/v1/users/me/watch" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "topicName":"projects/'"${{ secrets.GCP_PROJECT_ID }}"'/topics/'"${{ secrets.PUBSUB_TOPIC }}"'",
              "labelIds":["INBOX"]
            }'
